<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refrain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-base-100">

  <!-- First-run setup (Section 6) — shown instead of everything else until config.json is complete -->
  <div id="view-setup" class="max-w-lg mx-auto p-6 hidden">
    <h1 class="text-2xl font-bold flex items-center gap-2 mb-6">
      <i data-lucide="search"></i> Welcome to Refrain
    </h1>

    <div class="card bg-base-200">
      <div class="card-body gap-4">
        <div>
          <label class="label"><span class="label-text">ProPresenter host</span></label>
          <input id="setup-host" type="text" value="localhost" class="input input-bordered w-full" />
        </div>
        <div>
          <label class="label"><span class="label-text">ProPresenter port</span></label>
          <input id="setup-port" type="number" placeholder="e.g. 1025" class="input input-bordered w-full" />
        </div>

        <div class="flex items-center gap-2">
          <button id="setup-test-btn" class="btn btn-outline btn-sm">Test Connection</button>
          <span id="setup-test-result" class="text-sm"></span>
        </div>

        <div class="divider my-0"></div>

        <div>
          <label class="label"><span class="label-text">Is this the machine that runs ProPresenter live during service?</span></label>
          <div class="flex gap-4">
            <label class="label cursor-pointer gap-2">
              <input type="radio" name="setup-role" value="logger" class="radio" />
              <span class="label-text">Yes — this machine (logger)</span>
            </label>
            <label class="label cursor-pointer gap-2">
              <input type="radio" name="setup-role" value="reader" class="radio" checked />
              <span class="label-text">No — just searching (reader)</span>
            </label>
          </div>
        </div>

        <p class="text-xs opacity-60">
          Planning Center / shared-storage credentials for the optional arrangement-comparison
          module aren't collected here yet — that module isn't built. When it lands, drop
          credentials into <code>.env</code> directly; see <code>.env.example</code>.
        </p>

        <button id="setup-save-btn" class="btn btn-primary" disabled>Save &amp; Continue</button>

        <div id="setup-progress" class="hidden">
          <progress id="setup-progress-bar" class="progress progress-primary w-full"></progress>
          <div id="setup-progress-text" class="text-sm opacity-70 mt-1"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main app shell — nav rail + content, once setup is complete (Section 13) -->
  <div id="view-app" class="hidden flex min-h-screen">
    <aside id="nav-rail" class="shrink-0 bg-base-200 flex flex-col items-stretch py-3 transition-all duration-150 w-16">
      <div class="flex items-center gap-2 px-3 mb-4 overflow-hidden">
        <i data-lucide="search" class="shrink-0"></i>
        <span class="nav-label font-bold whitespace-nowrap hidden">Refrain</span>
      </div>

      <nav id="nav-items" class="flex flex-col gap-1 flex-1"></nav>

      <div class="flex flex-col gap-1 px-2">
        <button id="theme-toggle" class="btn btn-ghost btn-sm justify-start gap-3 px-2" title="Toggle theme">
          <span id="theme-icon" class="shrink-0"></span>
          <span class="nav-label whitespace-nowrap hidden" id="theme-label">Theme: System</span>
        </button>
        <button id="nav-pin-toggle" class="btn btn-ghost btn-sm justify-start gap-3 px-2" title="Expand sidebar">
          <span id="nav-pin-icon" class="shrink-0"></span>
          <span class="nav-label whitespace-nowrap hidden">Collapse</span>
        </button>
      </div>
    </aside>

    <main class="flex-1 p-6 max-w-3xl">
      <section id="view-search">
        <div class="flex items-center justify-between mb-4">
          <div id="index-status" class="text-sm opacity-70"></div>
        </div>

        <div class="alert alert-warning mb-4 hidden" id="connection-banner"></div>

        <div class="flex gap-2 mb-3">
          <input id="query" type="text" placeholder="Search any slide..." class="input input-bordered w-full" autofocus />
          <button id="rebuild-btn" class="btn btn-ghost" title="Rebuild index">
            <i data-lucide="refresh-cw"></i>
          </button>
        </div>

        <div class="flex flex-wrap items-center gap-2 mb-6">
          <button id="date-filter-toggle" class="btn btn-ghost btn-xs">
            <i data-lucide="calendar"></i> Date filter
          </button>
          <div id="date-filter-panel" class="hidden flex flex-wrap items-center gap-2">
            <select id="date-field" class="select select-bordered select-xs">
              <option value="modified">Last modified</option>
              <option value="created">Created</option>
            </select>
            <span class="text-xs opacity-60">from</span>
            <input id="date-from" type="date" class="input input-bordered input-xs" />
            <span class="text-xs opacity-60">to</span>
            <input id="date-to" type="date" class="input input-bordered input-xs" />
            <button id="date-filter-clear" class="btn btn-ghost btn-xs">Clear</button>
          </div>
        </div>

        <div id="results" class="flex flex-col gap-3"></div>
      </section>

      <section id="view-health" class="hidden flex flex-col gap-4"></section>

      <section id="view-lyrics-assist" class="hidden"></section>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
