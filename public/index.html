<!doctype html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refrain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-base-100">
  <div class="max-w-3xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        <i data-lucide="search"></i> Refrain
      </h1>
      <div id="index-status" class="text-sm opacity-70"></div>
    </header>

    <div id="connection-banner" class="alert alert-warning mb-4 hidden"></div>

    <div class="flex gap-2 mb-6">
      <input id="query" type="text" placeholder="Search any slide..." class="input input-bordered w-full" autofocus />
      <button id="rebuild-btn" class="btn btn-ghost" title="Rebuild index">
        <i data-lucide="refresh-cw"></i>
      </button>
    </div>

    <div id="results" class="flex flex-col gap-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
